<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilentBridge - Sign Language Recognition</title>
    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <!-- MediaPipe Hands (Tasks API for browser) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.mjs" type="module"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1117 50%, #0a0a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .container {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .video-wrapper {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid rgba(6, 182, 212, 0.4);
            background: #000;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.15);
        }

        video {
            transform: scaleX(-1);
            width: 640px;
            height: 480px;
            display: block;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .hands-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #06b6d4;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(6, 182, 212, 0.3);
            transform: scaleX(-1);
            z-index: 10;
        }

        .panel {
            background: rgba(255, 255, 255, 0.03);
            padding: 24px;
            border-radius: 16px;
            width: 320px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        .panel h2 {
            color: #06b6d4;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
        }

        #prediction {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, #10b981, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            min-height: 60px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        #confidence {
            color: #6b7280;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .conf-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .conf-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #06b6d4);
            border-radius: 3px;
            transition: width 0.2s ease;
            width: 0%;
        }

        .sentence-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            min-height: 80px;
            margin-bottom: 16px;
            font-size: 1.1rem;
            line-height: 1.6;
            color: #e5e7eb;
            word-wrap: break-word;
        }

        .sentence-label {
            font-size: 0.75rem;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #logs {
            font-size: 0.75rem;
            color: #4b5563;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
            flex: 1;
            font-family: 'Courier New', monospace;
        }

        .clear-btn {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.2rem;
            font-weight: 700;
            color: #06b6d4;
        }

        .stat-label {
            font-size: 0.65rem;
            color: #6b7280;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <h1>SilentBridge AI</h1>
    <p class="subtitle">Real-time Sign Language Recognition &mdash; 100 Signs &bull; 2-Hand Detection</p>

    <div class="container">
        <div>
            <div class="video-wrapper">
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="outputCanvas" width="640" height="480"></canvas>
                <div class="hands-badge" id="handsBadge">Hands: 0/2</div>
            </div>
        </div>

        <div class="panel">
            <h2>Detected Sign</h2>
            <div id="prediction">...</div>
            <div id="confidence">Confidence: 0%</div>
            <div class="conf-bar">
                <div class="conf-bar-fill" id="confBar"></div>
            </div>

            <div class="stats">
                <div class="stat">
                    <div class="stat-val" id="statSigns">100</div>
                    <div class="stat-label">Signs</div>
                </div>
                <div class="stat">
                    <div class="stat-val" id="statFPS">0</div>
                    <div class="stat-label">FPS</div>
                </div>
            </div>

            <div class="sentence-label">Sentence Builder</div>
            <div class="sentence-box" id="sentenceBox"></div>
            <button class="clear-btn" onclick="clearSentence()">Clear Sentence</button>

            <h2 style="margin-top: 16px;">Logs</h2>
            <div id="logs">Initializing...</div>
        </div>
    </div>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest";

        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const logsDiv = document.getElementById('logs');
        const predictionDiv = document.getElementById('prediction');
        const confidenceDiv = document.getElementById('confidence');
        const confBar = document.getElementById('confBar');
        const handsBadge = document.getElementById('handsBadge');
        const sentenceBox = document.getElementById('sentenceBox');
        const statFPS = document.getElementById('statFPS');

        function log(msg) { logsDiv.innerText = msg + '\n' + logsDiv.innerText; }

        let model, labelMap, normParams;
        let sentence = [];
        let lastSign = '';
        let lastSignTime = 0;
        let frameCount = 0;
        let lastFPSTime = Date.now();
        const THRESHOLD = 0.55;
        const COOLDOWN_MS = 1500; // Prevent rapid duplicate signs

        window.clearSentence = function () {
            sentence = [];
            sentenceBox.innerText = '';
            lastSign = '';
        };

        async function loadModel() {
            log("Loading TFJS Model...");
            model = await tf.loadLayersModel('/models/sign_language_model/model.json');
            log("Model loaded! Input shape: " + JSON.stringify(model.inputs[0].shape));

            const labelRes = await fetch('/models/sign_language_model/label_map.json');
            labelMap = await labelRes.json();
            log("Label map loaded: " + Object.keys(labelMap).length + " classes");

            const normRes = await fetch('/models/sign_language_model/norm_params.json');
            normParams = await normRes.json();
            log("Normalization params loaded.");
        }

        async function initHandLandmarker() {
            log("Loading MediaPipe HandLandmarker...");
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm"
            );

            const handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2,
                minHandDetectionConfidence: 0.5,
                minHandPresenceConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            log("HandLandmarker ready!");
            return handLandmarker;
        }

        function extractFeatures(result) {
            let leftFeatures = new Array(63).fill(0);
            let rightFeatures = new Array(63).fill(0);

            if (!result.landmarks || result.landmarks.length === 0) return null;

            for (let i = 0; i < result.landmarks.length; i++) {
                const lms = result.landmarks[i];

                // 1. Wrist-Relative Normalization
                const wrist = lms[0];
                const tempCoords = lms.map(lm => ({
                    x: lm.x - wrist.x,
                    y: lm.y - wrist.y,
                    z: lm.z - wrist.z
                }));

                // 2. Scale Normalization
                let maxDist = 0;
                tempCoords.forEach(c => {
                    const dist = Math.sqrt(c.x ** 2 + c.y ** 2 + c.z ** 2);
                    if (dist > maxDist) maxDist = dist;
                });

                const finalFeatures = [];
                if (maxDist > 0) {
                    tempCoords.forEach(c => {
                        finalFeatures.push(c.x / maxDist, c.y / maxDist, c.z / maxDist);
                    });
                } else {
                    tempCoords.forEach(() => finalFeatures.push(0, 0, 0));
                }

                // Determine handedness
                let handLabel = 'Right';
                if (result.handednesses && i < result.handednesses.length) {
                    handLabel = result.handednesses[i][0].categoryName;
                }

                if (handLabel === 'Left') {
                    leftFeatures = finalFeatures;
                } else {
                    rightFeatures = finalFeatures;
                }
            }

            return leftFeatures.concat(rightFeatures);
        }

        // Remove the old normalize function since it's now internal to extractFeatures or irrelevant with batchNorm
        function normalizeFeatures(features) {
            // We still use the normParams (mean/std) from training for global centering
            return features.map((f, i) => (f - normParams.mean[i]) / normParams.std[i]);
        }

        function drawLandmarks(result) {
            canvasCtx.clearRect(0, 0, 640, 480);

            if (!result.landmarks) return;

            const colors = ['#10b981', '#3b82f6']; // Green=left, Blue=right

            for (let h = 0; h < result.landmarks.length; h++) {
                const lms = result.landmarks[h];
                const color = colors[h % 2];

                // Draw connections
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4],
                    [0, 5], [5, 6], [6, 7], [7, 8],
                    [0, 9], [9, 10], [10, 11], [11, 12],
                    [0, 13], [13, 14], [14, 15], [15, 16],
                    [0, 17], [17, 18], [18, 19], [19, 20],
                    [5, 9], [9, 13], [13, 17]
                ];

                canvasCtx.strokeStyle = color;
                canvasCtx.lineWidth = 2;
                for (const [a, b] of connections) {
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(lms[a].x * 640, lms[a].y * 480);
                    canvasCtx.lineTo(lms[b].x * 640, lms[b].y * 480);
                    canvasCtx.stroke();
                }

                // Draw points
                for (const lm of lms) {
                    canvasCtx.beginPath();
                    canvasCtx.arc(lm.x * 640, lm.y * 480, 4, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = color;
                    canvasCtx.fill();
                }
            }

            handsBadge.innerText = `Hands: ${result.landmarks.length}/2`;
        }

        async function startCamera() {
            log("Starting camera...");
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { width: 640, height: 480 }
            });
            videoElement.srcObject = stream;
            await new Promise(r => videoElement.onloadeddata = r);
            log("Camera active!");
        }

        async function init() {
            try {
                await loadModel();
                const handLandmarker = await initHandLandmarker();
                await startCamera();

                log("Running inference loop...");

                async function detectFrame() {
                    const now = performance.now();
                    const result = handLandmarker.detectForVideo(videoElement, now);

                    drawLandmarks(result);

                    // FPS counter
                    frameCount++;
                    if (Date.now() - lastFPSTime > 1000) {
                        statFPS.innerText = frameCount;
                        frameCount = 0;
                        lastFPSTime = Date.now();
                    }

                    const features = extractFeatures(result);
                    if (features && model) {
                        const normalized = normalizeFeatures(features);
                        const inputTensor = tf.tensor2d([normalized], [1, 126]);
                        const pred = model.predict(inputTensor);
                        const predArray = await pred.data();
                        inputTensor.dispose();
                        pred.dispose();

                        const maxConf = Math.max(...predArray);
                        const maxIndex = predArray.indexOf(maxConf);
                        const signName = labelMap[String(maxIndex)] || `Class ${maxIndex}`;

                        if (maxConf > THRESHOLD) {
                            predictionDiv.innerText = signName;
                            confidenceDiv.innerText = `Confidence: ${(maxConf * 100).toFixed(1)}%`;
                            confBar.style.width = `${maxConf * 100}%`;

                            // Sentence builder
                            const currentTime = Date.now();
                            if (signName !== lastSign || (currentTime - lastSignTime) > COOLDOWN_MS * 2) {
                                if ((currentTime - lastSignTime) > COOLDOWN_MS) {
                                    sentence.push(signName);
                                    if (sentence.length > 20) sentence.shift();
                                    sentenceBox.innerText = sentence.join(' ');
                                    lastSign = signName;
                                    lastSignTime = currentTime;
                                }
                            }
                        } else {
                            confBar.style.width = `${maxConf * 100}%`;
                        }
                    } else {
                        handsBadge.innerText = 'Hands: 0/2';
                    }

                    requestAnimationFrame(detectFrame);
                }

                detectFrame();

            } catch (e) {
                log("ERROR: " + e.message);
                console.error(e);
            }
        }

        init();
    </script>
</body>

</html>
